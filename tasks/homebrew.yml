---
- name: Pre-create Homebrew directory to bypass sudo requirement
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_env.SUDO_USER | default(ansible_env.USER) }}"
        mode: '0755'
      loop:
        - /home/linuxbrew
        - /home/linuxbrew/.linuxbrew
        
- name: Check if Homebrew is already installed
  ansible.builtin.command: brew --version
  register: brew_check
  ignore_errors: true
  changed_when: false

- name: Download and install Homebrew (Non-Interactive)
  ansible.builtin.shell: >
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  environment:
    NONINTERACTIVE: "1"
  when: brew_check.rc != 0

- name: Add Homebrew to PATH for macOS Apple Silicon (Zsh)
  ansible.builtin.lineinfile:
    path: ~/.zprofile
    line: 'eval "$(/opt/homebrew/bin/brew shellenv)"'
    create: true
    state: present
  when:
    - brew_check.rc != 0
    - ansible_os_family == 'Darwin'
    - ansible_machine == 'arm64'

- name: Add Homebrew to PATH for Linux (Zsh/Bash)
  ansible.builtin.lineinfile:
    path: ~/.bashrc # Change to ~/.zshrc if using zsh on Linux
    line: 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"'
    create: true
    state: present
  when:
    - brew_check.rc != 0
    - ansible_os_family == 'Debian' or ansible_os_family == 'RedHat'
